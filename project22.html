<!DOCTYPE html>
<html>
    <head>

    </head>
    <body>
        <h2>Adding Arguments IN JS</h2>
        <p id="result"></p>
        <script>
            function Add() {
                var i;
                var add = 0;
                for(i = 0; i < 3; i++) {
                    if (arguments[i] > add) {
                        add = arguments[i];
                    }
                }
                return add;
            }
            document.getElementById("result").innerHTML = Add(7 + 9 + 3);
        </script>
    </body>
</html>
