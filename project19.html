<!DOCTYPE html>
<html>
    <head>
      <title>Operators</title>
    </head>
    <body>
       <h1>Operations</h1>
       <p id="demo">For addition</p>
       <script>
          var x = 2;
          var y = 3;
          var z = x + y;
          document.getElementById("demo").innerHTML = z;
        </script>
        <p id="demo1">For subtraction</p>
        <script>
          var x = 2;
          var y = 3;
          var z = x - y;
          document.getElementById("demo1").innerHTML = z;
        </script>
        <p id="demo2">For multiplication</p>
        <script>
          var x = 2;
          var y = 3;
          var z = x * y;
          document.getElementById("demo2").innerHTML = z;
        </script>
        <p id="demo3">For division</p>
        <script>
          var x = 2;
          var y = 3;
          var z = x / y;
          document.getElementById("demo3").innerHTML = z;
        </script>
       
    </body>
</html>
