<!DOCTYPE html>
<html>
    <head>
       <style>
          #box {
             background-color: yellow;
             margin-top: 50px;
             margin-left: 25px;
             margin-right: 25px;
             border: 10px solid black;
             padding-left: 25px;
             padding-right: 25px;
          }
       </style>
    </head>
    <body>
        <center>
        <div id="box">
        <h1>Digital Clock</h1>
        <div id="MyClockDisplay" onload="showTime()"></div>
        </div>
        <script>
            function showTime() {
                var date = new Date();
                var h = date.getHours();
                var m = date.getMinutes();
                var s = date.getSeconds();
                var session = "AM"
                if(h > 12){
                    h = h - 12;
                    session = "PM";
                }
                h = (h < 10) ? "0" + h : h;
                m = (m < 10) ? "0" + m : m;
                s = (s < 10) ? "0" + s : s;
                var time = h + ":" + m + ":" + s + " " + session;
                document.getElementById("MyClockDisplay").innerText = time;
                setTimeout(showTime, 1000);
            }
            showTime();

        </script>
        </center>
    </body>
</html>
