<!DOCTYPE html>
<html>

    <body>
        <p id="demo"></p>
        <script>
            var numbers = ["1", "2", "3",
                "4", "5", "6", "7"
            ];
            document.write (Math.round(55.7));
            var text = "";
            var i;
            for (i = 0; i < numbers.length; i++) {
                text += numbers[i] + "<br>";
            }
            document.getElementById("demo").innerHTML = text;
        </script>
    </body>
</html>
