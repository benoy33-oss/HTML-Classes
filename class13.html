<!doctype html>
<html lang="en">
  <head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <style>
        .col {
            text-align: center;
            border: solid black;
        }
    </style>
  </head>
  <body>
    <div class="container">
      <h3>Equal width cloumn grid</h3>
      <div class="row">
         <div class="col">
            column 1
         </div>
         <div class="col">
            column 2
         </div>
         <div class="col">
            column 3
         </div>
      </div>


      <h1>Activity 2</h1>
      <div class="row">
         <div class="col-md-8 col-xs-4" style="background-color: red; border: 1px solid black;">xs</div>
         <div class="col-md-12 col-md-5" style="background-color: lavender;">.col-xs-3</div>
       </div>


       <div class="row">
          <!--Size Large, medium and extra small-->
          <div class="col-md-12 col-lg-6" style="background-color: lavenderblush;">.col-xs-6</div>
          <div class="col-xs-6 col-md-2" style="background-color: lightgrey;">.col-xs-6</div>
       </div>


       <div class="row" style="background-color: lightcyan;">
          <!--Size extra small-->
          <div class="col-xs-6">.col-xs-6</div>
          <div class="col-xs-6">.col-xs-6</div>
       </div>


       <div class="row">
          <div class="col-lg-4" style="background-color: yellow;">
            dummy
          </div>
          <div class="col-lg-8" style="background-color: pink;">
            dummy
          </div>
       </div>
      </div>
    </div>
  </body>
</html>
