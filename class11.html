<!DOCTYPE html>
<html>
    <head>
       <style>
        .example1 {
        width:200px;
        background-color: yellow;
        padding:0px;
        border:0px;
        margin:0px;  
       }
       .example2 {
        width:220px;
        background-color:green;
        padding:50px;
        border:5px solid black;
        margin:40px 20px; 
       }             
       img#flowerRight{
        float:right;
        border:5px solid black;
       }
       img#flowerLeft{
        float:left;
        border:5px solid black;
       }
       </style>
    </head>
    <body>
       <h1>Box Model</h1>
       <hr>
       <p class="example1">My Content Example 1</p>
       <p class="example2">My Content Example 2</p>
       <h2>Float</h2>
       <p>In this example, the image will float to the right in the paragraph, and the text in the paragrapgh will wrap around the image.</p>
       <img id="flowerRight" src="https://cdn.britannica.com/45/5645-050-B9EC0205/head-treasure-flower-disk-flowers-inflorescence-ray.jpg"
       alt="tree" style="width:150px;height:100px;">
       <img id="flowerLeft" src="https://cdn.britannica.com/45/5645-050-B9EC0205/head-treasure-flower-disk-flowers-inflorescence-ray.jpg"
       alt="tree" style="width:150px;height:100px;">
    </body>
</html>
