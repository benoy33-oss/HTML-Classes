<!DOCTYPE html>
<html>
    <head>
    <title>Gradients</title>
    <style>
        #grad1{
            height:400px;
            background-image: linear-gradient(to top right, red, yellow, orange, green, blue, indigo, violet);
        }
        #grad2{
            height: 200px;
            background-image: radial-gradient(pink, yellow, red, blue);
        }
    </style>
    </head>
    <body>
        <div id="grad1" style="text-align:center;margin:auto;color:#888888;font-size:40px;font-weight:bold">
            Welcome to Codingal
        </div><br>
        <div id="grad2">
            Radial Gradient
        </div>
    </body>
</html>
